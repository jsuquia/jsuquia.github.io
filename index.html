<!DOCTYPE html>
<html>
	
<head>
	<meta http-equiv="refresh" content="0; url=https://zeno.computing.dundee.ac.uk/2017-projects/team5/industrial_project/dashbord.php" />
    <link rel="icon" href="img/logo.png">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
	<link href="https://fonts.googleapis.com/css?family=Roboto+Mono:100" rel="stylesheet">
    <link rel="stylesheet" href="http://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css" type="text/css">
    <TITLE>Familia Suquia</TITLE>
	
</head>

<body>
<div class="content">
  <div class="welcomeText">
    <div class="welcome">
      <h1 class="greet">FAMILIA SUQUIA</h1>
    </div>
    <div class="subText">
      <div class="subTexts">
        <p class="soon">Te damos la bienvenida a nuestra pagina web</p>
       </div>
    </div>
  </div>
  
  <div class="form">
    <div class="sub">
      <button class="button" onClick="passWord()">Entra</button>
    </div>
  </div>
  
  <div class="social">
    <div class="follow">
      <p class="followUs">Siguenos</p>
    </div>
    <div class="socialIcons">
      <div class="socialIcon facebook brandico-facebook-rect"></div>
      <div class="socialIcon  twitter brandico-twitter-bird"></div>
      <div class="socialIcon  github brandico-github"></div>
    </div>
  </div>
</div>

<script>
            window.addEventListener('load',function(){
              var welcome = document.querySelector('.greet'),
                  subtext = document.querySelector('.subTexts'),
                  form    = document.querySelector('.sub'),
                  follow  = document.querySelector('.followUs'),
                  social  = document.querySelectorAll('.socialIcon'),
                  delay = 1000; 


              setTimeout(function(){welcome.style.top='0';},delay);
              setTimeout(function(){subtext.style.bottom = '0%';},delay*2);
              setTimeout(function(){form.style.opacity='1';},delay*4);
              setTimeout(function(){follow.style.bottom='0%';},delay*5);
              setTimeout(
                function(){
                  social[0].style.marginTop='0px';
                  social[1].style.marginTop='0px';
                  social[2].style.marginTop='0px';
                },delay*6
              ); 

            });
    
            function passWord() {
            var testV = 1;
            var pass1 = prompt('Please Enter Your Password',' ');
            while (testV < 3) {
            if (!pass1) 
            history.go(-1);
            if (pass1.toLowerCase() == "vamonos") {
            window.open('main.html','_self');
            break;
            } 
            testV+=1;
            var pass1 = 
            prompt('Access Denied - Password Incorrect, Please Try Again.','Password');
            }
            if (pass1.toLowerCase()!="password" & testV ==3) 
            history.go(-1);
            return " ";
            }

</script>
</body>
</html>
